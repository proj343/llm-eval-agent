name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/eval_agent --ignore-missing-imports

      - name: Unit tests
        run: pytest tests/ -v --ignore=tests/test_regression.py -x
        env:
          PYTHONPATH: src

      - name: Regression tests
        run: pytest tests/test_regression.py -v
        env:
          PYTHONPATH: src
